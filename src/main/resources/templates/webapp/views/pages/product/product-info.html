<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">

<div th:replace="~{header :: stylesheets(title='Product information')}"></div>

<body class="hold-transition sidebar-mini layout-fixed sidebar-collapse">
    <div class="wrapper">
        <div th:replace="~{header :: header}"></div>

        <div th:replace="~{sidebar :: sidebar}"></div>

        <div class="content-wrapper" style="padding-top: 10px; padding-bottom: 1px;">
            <section class="content">
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-12">
                            <div class="card card-primary card-outline card-tabs">
                                <div class="card-header p-0">
                                    <ul class="nav nav-tabs" id="custom-tabs" role="tablist">
                                        <li class="nav-item">
                                            <a class="nav-link font-weight-bold active" id="custom-tabs-one-description-tab"
                                               data-toggle="pill" href="#custom-tabs-one-description" role="tab">Description</a>
                                        </li>
                                        <li class="nav-item">
                                            <a class="nav-link font-weight-bold" id="custom-tabs-two-images-tab"
                                               data-toggle="pill" href="#custom-tabs-two-image" role="tab">Images</a>
                                        </li>
                                    </ul>
                                </div>
                                <div class="card-body p-0">
                                    <div class="tab-content" id="custom-tabs-tabContent">
                                        <div class="tab-pane fade active show" id="custom-tabs-one-description" role="tabpanel">
                                            <div class="row justify-content-between">
                                                <div class="col-12 text-right mt-1 mb-1">
                                                    <button type="button" class="btn btn-sm btn-info ml-1 mr-1" id="btnUpdateProductDescription">
                                                        <i class="fa-solid fa-pencil mr-2"></i>Save
                                                    </button>
                                                </div>
                                            </div>
                                            <div class="row">
                                                <div class="col-12">
                                                    <textarea id="txtProductDescriptionDisplayed" th:text="${detailProducts.description}"></textarea>
                                                    <input id="txtProductDescriptionContent" style="display: none"/>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="tab-pane fade" id="custom-tabs-two-image" role="tabpanel">
                                            <div th:replace="~{pages/product/fragments/product-fragments :: imageOfProductTab}"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div th:replace="~{modal_fragments :: confirm_modal}"></div>
        <!--Modal thay đổi image-->
        <div th:replace="~{pages/product/fragments/product-fragments :: changeImageModal}"></div>
        <!--Modal active image-->
        <div th:replace="~{pages/product/fragments/product-fragments :: activeImageModal}"></div>

        <div th:replace="~{footer :: footer}"></div>

        <aside class="control-sidebar control-sidebar-dark"></aside>

        <div th:replace="~{header :: scripts}"></div>

        <script th:src="@{/js/product/DeleteProduct.js}"></script>
        <script th:src="@{/js/product/Image.js}"></script>
        <script th:src="@{/js/product/LoadProductDetail.js}"></script>
        <script th:src="@{/js/product/Product.js}"></script>
        <script th:src="@{/js/product/UpdateProductDescription.js}"></script>
    </div>

    <script>
        let mvProductId = [[${productId}]];
        let mvImagesOfProduct = [];
        let mvImageActive = {};

        $(document).ready(function () {
            init();
            updateDeleteAction();
            loadImagesOfProduct();
            changeImage();
            activeImage();

            $("#btnUpdateProductDescription").on("click", function () {
                updateProductDescription();
            });
        })

        function init() {
            $('.product-image-thumb').on('click', function () {
                var $image_element = $(this).find('img')
                $('.product-image').prop('src', $image_element.attr('src'))
                $('.product-image-thumb.active').removeClass('active')
                $(this).addClass('active')
            });
            $('#txtProductDescriptionDisplayed').summernote({
                height: 500, // chiều cao của trình soạn thảo
                callbacks: {
                    onChange: function (contents, $editable) {
                        // Lưu nội dung của trình soạn thảo vào trường ẩn
                        $('#txtProductDescriptionContent').val(contents);
                    }
                }
            });
        }
    </script>

    <script> // Upload file
    // DropzoneJS Demo Code Start
    Dropzone.autoDiscover = true

    // Get the template HTML and remove it from the doumenthe template HTML and remove it from the doument
    var previewNode = document.querySelector("#template")
    previewNode.id = ""
    var previewTemplate = previewNode.parentNode.innerHTML
    previewNode.parentNode.removeChild(previewNode)

    var myDropzone = new Dropzone(document.body, { // Make the whole body a dropzone
        url: "/uploads/san-pham/[[${detailProducts.id}]]", // Gọi tới API trong spring để xử lý file
        thumbnailWidth: 80,
        thumbnailHeight: 80,
        parallelUploads: 20,
        previewTemplate: previewTemplate,
        autoQueue: false, // Make sure the files aren't queued until manually added
        previewsContainer: "#previews", // Define the container to display the previews
        clickable: ".fileinput-button", // Define the element that should be used as click trigger to select files.
    })

    myDropzone.on("addedfile", function (file) {
        // Hookup the start button
        file.previewElement.querySelector(".start").onclick = function () {
            myDropzone.enqueueFile(file)
        }
    })

    // Update the total progress bar
    myDropzone.on("totaluploadprogress", function (progress) {
        document.querySelector("#total-progress .progress-bar").style.width = progress + "%"
    })

    myDropzone.on("sending", function (file) {
        // Show the total progress bar when upload starts
        document.querySelector("#total-progress").style.opacity = "1"
        // And disable the start button
        file.previewElement.querySelector(".start").setAttribute("disabled", "disabled")
    })

    // Hide the total progress bar when nothing's uploading anymore
    myDropzone.on("queuecomplete", function (progress) {
        document.querySelector("#total-progress").style.opacity = "0"
    })

    // Setup the buttons for all transfers
    // The "add files" button doesn't need to be setup because the config
    // `clickable` has already been specified.
    document.querySelector("#actions .start").onclick = function () {
        myDropzone.enqueueFiles(myDropzone.getFilesWithStatus(Dropzone.ADDED))
    }
    document.querySelector("#actions .cancel").onclick = function () {
        myDropzone.removeAllFiles(true)
    }
    // DropzoneJS Demo Code End
    </script>
</body>
</html>
